site_name: 我的组件文档平台
site_description: 主仓库+子模块组件文档汇总网站
site_author: 个人

extra_css:
  - assets/custom.css
extra_javascript:
  - assets/custom.js

nav:
  - 首页: index.md
  - 开发指南: dev-guide.md
  - 部署手册: deploy.md
  - 组件文档:

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换暗色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换亮色

markdown_extensions:
  - tables
  - admonition
  - details
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search:
      lang: zh

